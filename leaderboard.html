<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws of Fury Bingo</title>
    <link rel="icon" href="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=32">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img class="logo-icon" src="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=128" alt=""> Paws of Fury Bingo
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Tasks</a>
            <a href="boss-battle.html" class="nav-link">⚔️ Boss Battle</a>
            <a href="info.html" class="nav-link">Info</a>
            <a href="https://discord.gg/paws-of-fury" target="_blank" rel="noopener" class="nav-link">Discord</a>
            <button id="auth-btn" class="btn btn-outline" onclick="window.bingoAuth?.toggleLogin()">Login</button>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title">Leaderboard</h1>
        <p id="day-info" class="text-muted text-center"></p>
        <div id="double-points-banner" style="display:none;text-align:center;margin:0.75rem 0 1.25rem;padding:0.75rem 1.25rem;background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,140,0,0.15));border:1px solid rgba(255,215,0,0.4);border-radius:10px;font-weight:700;font-size:1rem;color:#ffd700;">
            🎊 Today is <strong>Double Points Day</strong>! All task completions earn 2× points.
        </div>

        <div id="leaderboard" class="leaderboard">
            <p class="text-muted text-center">Loading...</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Paws of Fury</p>
    </footer>

    <!-- Member submissions modal -->
    <div id="member-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:1rem;">
        <div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;padding:1.5rem;position:relative;">
            <button id="member-modal-close" style="position:absolute;top:0.75rem;right:1rem;background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;">×</button>
            <h3 id="member-modal-title" style="margin-bottom:1rem;font-size:1.1rem;"></h3>
            <div id="member-modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/leaderboard-page.js"></script>
</body>
</html>
