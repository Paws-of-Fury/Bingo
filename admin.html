<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws of Fury Bingo</title>
    <link rel="icon" href="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=32">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img class="logo-icon" src="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=128" alt=""> Paws of Fury Bingo
        </a>
        <div class="nav-links">
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            <button id="auth-btn" class="btn btn-outline" onclick="window.bingoAuth?.toggleLogin()">Login</button>
        </div>
    </nav>

    <main class="container" style="max-width:800px;">
        <!-- Admin login -->
        <div id="admin-login" class="card card-center">
            <h2>Admin Access</h2>
            <p class="text-muted" style="margin:1rem 0;">Enter the admin passphrase to manage tasks.</p>
            <input type="password" id="admin-pass-input" class="form-input" placeholder="Admin passphrase">
            <button id="admin-login-btn" class="btn btn-gold btn-full" style="margin-top:1rem;">Login as Admin</button>
            <p id="admin-login-error" class="text-muted" style="color:#e74c3c;margin-top:0.5rem;display:none;"></p>
        </div>

        <!-- Admin panel (hidden until authenticated) -->
        <div id="admin-panel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h1 class="page-title" style="font-size:1.6rem;">Task Manager</h1>
                <button id="admin-logout-btn" class="btn btn-outline" style="font-size:0.8rem;">Logout Admin</button>
            </div>

            <!-- Add task form -->
            <div class="card" style="margin-bottom:2rem;">
                <h3 style="margin-bottom:1rem;">Add / Edit Task</h3>
                <input type="hidden" id="edit-task-id" value="">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Day (1–15)</label>
                        <input type="number" id="task-day" class="form-input" min="1" max="15" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Points</label>
                        <input type="number" id="task-points" class="form-input" min="1" placeholder="1" value="1">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="task-title" class="form-input" placeholder="e.g. 2 Nex drops">
                </div>
                <div class="form-group">
                    <label class="form-label">Description (optional)</label>
                    <textarea id="task-desc" class="form-input form-textarea" rows="3" placeholder="Details..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL (optional)</label>
                    <input type="text" id="task-image" class="form-input" placeholder="https://...">
                </div>
                <div style="display:flex;gap:0.5rem;">
                    <button id="task-save-btn" class="btn btn-gold">Add Task</button>
                    <button id="task-cancel-btn" class="btn btn-outline" style="display:none;">Cancel Edit</button>
                </div>
                <p id="task-save-status" class="text-muted" style="margin-top:0.5rem;"></p>
            </div>

            <!-- Existing tasks -->
            <h3 style="margin-bottom:1rem;">Existing Tasks</h3>
            <div id="tasks-list"></div>

            <!-- Submissions review -->
            <div style="margin-top:2.5rem;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                    <h3>Submissions</h3>
                    <div style="display:flex;gap:0.5rem;">
                        <button id="filter-pending" class="btn btn-outline filter-btn active" data-filter="pending">Pending</button>
                        <button id="filter-approved" class="btn btn-outline filter-btn" data-filter="approved">Approved</button>
                        <button id="filter-denied" class="btn btn-outline filter-btn" data-filter="denied">Denied</button>
                        <button id="filter-all" class="btn btn-outline filter-btn" data-filter="all">All</button>
                    </div>
                </div>
                <div id="submissions-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Paws of Fury</p>
    </footer>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
