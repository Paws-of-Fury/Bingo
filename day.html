<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws of Fury — Task</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <span class="logo-paw">🐾</span> Paws of Fury Bingo
        </a>
        <div class="nav-links">
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            <button id="auth-btn" class="btn btn-outline" onclick="window.bingoAuth?.toggleLogin()">Login</button>
        </div>
    </nav>

    <main class="container day-container">
        <!-- Day navigation -->
        <div class="day-nav">
            <a id="prev-day" class="day-arrow day-arrow-prev" href="#">&#8592; Previous</a>
            <h2 id="day-heading" class="day-heading">Day ?</h2>
            <a id="next-day" class="day-arrow day-arrow-next" href="#">Next &#8594;</a>
        </div>

        <!-- Unrevealed state -->
        <div id="task-unrevealed" class="task-detail">
            <div class="task-unrevealed">
                <span class="big-question">?</span>
                <p>This task hasn't been revealed yet.</p>
            </div>
        </div>

        <!-- Revealed tasks (one card per task, generated by JS) -->
        <div id="tasks-container" class="tasks-container" style="display:none;"></div>

        <!-- Login prompt (shown once at the bottom when not signed in) -->
        <div id="login-prompt" class="login-prompt" style="display:none;">
            <p>Log in to submit proof for tasks.</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Paws of Fury</p>
    </footer>

    <script type="module" src="js/day.js"></script>
</body>
</html>
