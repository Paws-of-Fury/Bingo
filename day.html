<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws of Fury Bingo</title>
    <link rel="icon" href="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=32">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img class="logo-icon" src="https://cdn.discordapp.com/icons/1327651830133690439/ae23d4aed874053800d2a9dfb95ad426.png?size=128" alt=""> Paws of Fury Bingo
        </a>
        <div class="nav-links">
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            <a href="boss-battle.html" class="nav-link">⚔️ Boss Battle</a>
            <a href="info.html" class="nav-link">Info</a>
            <a href="https://discord.gg/paws-of-fury" target="_blank" rel="noopener" class="nav-link">Discord</a>
            <button id="auth-btn" class="btn btn-outline" onclick="window.bingoAuth?.toggleLogin()">Login</button>
        </div>
    </nav>

    <main class="container day-container">
        <!-- Day navigation -->
        <div class="day-nav">
            <a id="prev-day" class="day-arrow day-arrow-prev" href="#">&#8592; Previous</a>
            <h2 id="day-heading" class="day-heading">Day ?</h2>
            <a id="next-day" class="day-arrow day-arrow-next" href="#">Next &#8594;</a>
        </div>

        <!-- Unrevealed state -->
        <div id="task-unrevealed" class="task-detail">
            <div class="task-unrevealed">
                <span class="big-question">?</span>
                <p>This task hasn't been revealed yet.</p>
            </div>
        </div>

        <!-- Double points banner (shown by JS on day 7) -->
        <div id="double-points-banner" style="display:none;text-align:center;margin:0.5rem 0 1.25rem;padding:0.75rem 1.25rem;background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,140,0,0.15));border:1px solid rgba(255,215,0,0.4);border-radius:10px;font-weight:700;font-size:1rem;color:#ffd700;">
            🎊 Today is <strong>Double Points Day</strong>! All task completions earn 2× points.
        </div>

        <!-- Revealed tasks (one card per task, generated by JS) -->
        <div id="tasks-container" class="tasks-container" style="display:none;"></div>

        <!-- Login prompt (shown once at the bottom when not signed in) -->
        <div id="login-prompt" class="login-prompt" style="display:none;">
            <p>Log in to submit proof for tasks.</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Paws of Fury</p>
    </footer>

    <script type="module" src="js/day.js"></script>
</body>
</html>
